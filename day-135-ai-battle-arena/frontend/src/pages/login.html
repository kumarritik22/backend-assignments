<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- Top Navigation Suppression: Not rendered per "Destination Rule" for login screens -->
<main class="relative w-full max-w-md px-8 py-12 flex flex-col items-center z-10">
<!-- Background Ambient Element -->
<div class="absolute -top-24 -left-24 w-64 h-64 bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute -bottom-24 -right-24 w-64 h-64 bg-surface-bright/20 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Logo Section -->
<div class="mb-12 flex flex-col items-center">
<div class="w-20 h-20 bg-surface-container-highest rounded-2xl flex items-center justify-center mb-6 shadow-[0_16px_32px_rgba(0,0,0,0.4)]">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">shield</span>
</div>
<h2 class="text-primary font-extrabold tracking-[0.2em] text-sm uppercase">AI BATTLE ARENA</h2>
</div>
<!-- Headline Content -->
<div class="text-center mb-10">
<h1 class="text-on-surface text-4xl font-extrabold tracking-tight mb-3">Welcome Back</h1>
<p class="text-secondary text-sm font-medium leading-relaxed">Enter your credentials to enter the arena.</p>
</div>
<!-- Form Section -->
<div class="w-full space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-secondary text-[10px] font-bold uppercase tracking-widest ml-1">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg group-focus-within:text-primary transition-colors">mail</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-highest border-none rounded-xl text-on-surface placeholder:text-secondary/40 focus:ring-2 focus:ring-primary/20 focus:outline-none transition-all duration-300" placeholder="commander@arena.ai" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<label class="block text-secondary text-[10px] font-bold uppercase tracking-widest ml-1">Access Code</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg group-focus-within:text-primary transition-colors">lock</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-highest border-none rounded-xl text-on-surface placeholder:text-secondary/40 focus:ring-2 focus:ring-primary/20 focus:outline-none transition-all duration-300" placeholder="••••••••" type="password"/>
<div class="absolute inset-y-0 right-4 flex items-center">
<span class="material-symbols-outlined text-secondary/60 cursor-pointer hover:text-primary text-lg">visibility</span>
</div>
</div>
<div class="flex justify-end">
<a class="text-primary/70 text-xs font-semibold hover:text-primary transition-colors" href="#">Forgot Access Code?</a>
</div>
</div>
<!-- Primary Action -->
<button class="arena-gradient w-full h-14 rounded-xl text-on-primary font-bold text-base shadow-[0_8px_24px_rgba(123,208,255,0.25)] hover:shadow-[0_12px_32px_rgba(123,208,255,0.35)] active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-2 mt-4">
<span>Log In</span>
<span class="material-symbols-outlined text-xl">login</span>
</button>
</div>
<!-- Secondary Action -->
<div class="mt-10 text-center">
<p class="text-secondary text-sm">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4 ml-1" href="#">Sign up</a>
</p>
</div>
<!-- Biometric / Alternative Option (Curated Layout) -->
<div class="mt-12 w-full pt-12 flex flex-col items-center">
<div class="flex items-center gap-4 w-full mb-8">
<div class="h-px flex-1 bg-gradient-to-r from-transparent via-outline-variant/30 to-transparent"></div>
<span class="text-secondary/40 text-[10px] font-bold tracking-widest uppercase">Or synchronize via</span>
<div class="h-px flex-1 bg-gradient-to-r from-transparent via-outline-variant/30 to-transparent"></div>
</div>
<div class="flex gap-4">
<button class="w-14 h-14 rounded-full bg-surface-container-low flex items-center justify-center hover:bg-surface-container-high transition-colors shadow-sm">
<img alt="Google" class="w-5 h-5 opacity-70" data-alt="minimalist google identity provider icon with subtle transparency" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBu1AARVwBr2BPswMKVRkLebqMZRGQyUgUMulMO7IAnd68FQuGz2woMGJ01asoMHqLOYY1qaM2G9nrXt3q3t2o_IvJsybbiuDUmekUet62sDJaGuXACar3pMEVk5OAErjJYJocgMx_KruIn3lud5Hljx1E6R5bjYxSAZYJjxPKQ8j34n95ZE9aWs4Wlt9XtDjfdW00t-r5K1huUontc60i6cZP8vPxGizgJrX-d6WxbeakqV0TeVh5rbFJ2JOXYhzBpt3cJfM6O71g"/>
</button>
<button class="w-14 h-14 rounded-full bg-surface-container-low flex items-center justify-center hover:bg-surface-container-high transition-colors shadow-sm">
<span class="material-symbols-outlined text-on-surface/70" style="font-variation-settings: 'FILL' 1;">fingerprint</span>
</button>
</div>
</div>
</main>
<!-- Footer Decorative Element -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/20 to-transparent"></div>
<!-- Background Decoration Image -->
<div class="fixed inset-0 -z-10 opacity-10 pointer-events-none">
<img alt="Network UI background" class="w-full h-full object-cover mix-blend-overlay" data-alt="abstract digital network visualization with glowing nodes and connecting lines on a deep blue background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB_1xjntDKyNOB-tbAN6mWxWb9MlP-4a8Yrt6Pc7ez7tJEIW9paEk09NhACPFQAVWrhHFZFV3XZTvyw8kSRrVF-nYsBCkUMVLY0AmP7XxpfVCyqOGYeT8AsMW3Vmc32a8MgKslAZ5g0uBgOIVb7DnC3Bi596Zt3vIZ2nVCKhTRujUh0ihTXly3OL_8QGlSZNamZ-nDcNspmgYxdglMRtUj2K2WXAIR_60FJJ79T6jaLg9fra8QgSkJRZRyaR7-ZvVgImz9uWSZNqsQ"/>
